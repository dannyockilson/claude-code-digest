name: Weekly Digest

on:
  schedule:
    - cron: '0 7 * * 0'  # Sunday 7 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pages: write
  pull-requests: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect.py

      - name: Curate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/curate.py

      - name: Publish digest
        if: ${{ github.event_name == 'schedule' || !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/publish.py

      - name: Open pull request
        if: ${{ github.event_name == 'schedule' || !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="digest/$(date +%Y-%m-%d)"
          git config user.name "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "digest: $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "digest: $(date +%Y-%m-%d)" \
            --body "Weekly digest for $(date +%Y-%m-%d). Review and merge to publish to GitHub Pages." \
            --base primary \
            --head "$BRANCH"
